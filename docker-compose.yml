version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: moneta-crm-db
    environment:
      POSTGRES_USER: moneta
      POSTGRES_PASSWORD: moneta2024
      POSTGRES_DB: moneta_crm
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U moneta -d moneta_crm']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
